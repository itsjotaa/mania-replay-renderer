name: Build

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            ffmpeg \
            liblzma-dev \
            libgtk-3-dev \
            libwayland-dev \
            pkg-config \
            libfreetype-dev \
            libudev-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libflac-dev \
            libogg-dev \
            libvorbis-dev \

      - name: Build miniz
        run: |
          git clone --depth 1 https://github.com/richgel999/miniz.git
          cd miniz
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja -C build
          sudo ninja -C build install

      - name: Build SFML 3
        run: |
          git clone --depth 1 --branch 3.0.0 https://github.com/SFML/SFML.git
          cd SFML
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON -DSFML_BUILD_AUDIO=OFF -DSFML_BUILD_NETWORK=OFF
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Build nativefiledialog-extended
        run: |
          git clone https://github.com/btzy/nativefiledialog-extended.git
          cd nativefiledialog-extended
          git submodule update --init --recursive
          cmake -B build -G Ninja
          ninja -C build
          sudo ninja -C build install

      - name: Build project
        run: |
          cmake -B build -G Ninja
          ninja -C build

      - name: Package
        run: |
          mkdir -p release/assets
          cp build/mania-renderer release/
          cp assets/font.ttf release/assets/
          tar -czf mania-replay-renderer-linux.tar.gz -C release .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: mania-replay-renderer-linux.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies via vcpkg
        run: |
          vcpkg install sfml:x64-windows
          vcpkg install liblzma:x64-windows
          vcpkg install miniz:x64-windows

      - name: Build nativefiledialog-extended
        run: |
          git clone https://github.com/btzy/nativefiledialog-extended.git
          cd nativefiledialog-extended
          git submodule update --init --recursive
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
          cmake --build build --config Release
          cmake --install build --prefix C:/nfd

      - name: Build project
        run: |
          cmake -B build `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DCMAKE_PREFIX_PATH=C:/nfd
          cmake --build build --config Release

      - name: Package
        run: |
          mkdir release
          mkdir release\assets
          copy build\Release\mania-renderer.exe release\
          copy assets\font.ttf release\assets\
          copy C:\vcpkg\installed\x64-windows\bin\sfml-graphics-3.dll release\
          copy C:\vcpkg\installed\x64-windows\bin\sfml-window-3.dll release\
          copy C:\vcpkg\installed\x64-windows\bin\sfml-system-3.dll release\
          copy C:\vcpkg\installed\x64-windows\bin\liblzma.dll release\
          copy C:\vcpkg\installed\x64-windows\bin\miniz.dll release\
          Compress-Archive -Path release\* -DestinationPath mania-replay-renderer-windows.zip 
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: mania-replay-renderer-windows.zip
